name: Actualizar Web con IA

on:
  schedule:
    # Esto ejecuta el script todos los días a las 8:00 AM UTC
    - cron: '0 8 * * *' 
  workflow_dispatch: # Esto te pone un botón para que lo ejecutes manualmente cuando quieras

jobs:
  update-website:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el repositorio
      uses: actions/checkout@v4

    - name: 2. Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. Instalar la nueva librería de Gemini
      run: pip install google-genai

    - name: 4. Ejecutar el script de IA
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python actualizar_web.py

    - name: 5. Subir los cambios a GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add .
        git commit -m "Actualización automática: Web modular generada por IA" || echo "No hay cambios para subir"
        git push
